<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DaMo Design System - 图标库</title>
    <style>
      :root {
        --brand: #e62828;
        --brand-weak: #ffedeb;
        --text-title: #333333;
        --text-subtitle: #666666;
        --text-desc: #999999;
        --line: #eeeeee;
        --page: #ffffff;
        --panel: #fafafa;
        --container: 1140px;
        --sidebar: 220px;
        --topbar: 80px;
        --icon-card-min: 128px;
        --icon-grid-gap: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        color: var(--text-title);
        background: var(--page);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
          "Microsoft YaHei", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 100;
        height: var(--topbar);
        background: #ffffff;
      }

      .topbar-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: min(100%, var(--container));
        height: var(--topbar);
        margin: 0 auto;
        border-bottom: 1px solid #dcdfe6;
      }

      .brand {
        display: flex;
        align-items: center;
      }

      .brand-logo {
        display: block;
        width: 146px;
        height: 38px;
        object-fit: contain;
      }

      .topnav {
        display: flex;
        align-items: center;
        height: 100%;
        font-size: 14px;
      }

      .topnav a {
        display: flex;
        align-items: center;
        height: 100%;
        padding: 0 24px;
        color: var(--text-title);
        font-weight: 400;
        text-decoration: none;
      }

      .topnav a:hover,
      .topnav a.is-active {
        color: var(--brand);
      }

      .topnav a.is-active {
        font-weight: 700;
      }

      .layout {
        display: grid;
        grid-template-columns: var(--sidebar) minmax(0, 1fr);
        gap: 54px;
        width: min(100%, var(--container));
        margin: 0 auto;
        min-height: calc(100vh - var(--topbar));
      }

      .sidebar {
        position: sticky;
        top: var(--topbar);
        align-self: start;
        padding: 54px 30px 42px 0;
        background: #ffffff;
      }

      .side-primary-link {
        display: block;
        height: 40px;
        color: var(--text-title);
        font-size: 16px;
        font-weight: 700;
        line-height: 40px;
        text-decoration: none;
      }

      .side-section {
        margin-top: 18px;
      }

      .side-section-title {
        margin: 18px 0 0;
        color: var(--text-desc);
        font-size: 12px;
        line-height: 26px;
      }

      .sidenav {
        margin: 0;
        padding: 0;
        list-style: none;
        overflow: hidden;
      }

      .sidenav a {
        display: block;
        height: 34px;
        color: var(--text-subtitle);
        font-size: 14px;
        line-height: 34px;
        overflow: hidden;
        text-decoration: none;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .sidenav a:hover,
      .sidenav a.is-active {
        color: var(--brand);
      }

      .main {
        min-width: 0;
        padding: 54px 0 90px;
      }

      .doc-header {
        margin-bottom: 42px;
      }

      .doc-title {
        margin: 0;
        color: var(--text-title);
        font-size: 28px;
        font-weight: 400;
        line-height: 1;
      }

      .doc-header p {
        margin: 12px 0 0;
        color: var(--text-subtitle);
        font-size: 14px;
        line-height: 1.7;
      }

      .doc-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        width: 100%;
        margin-top: 24px;
        padding: 6px 18px;
        border-radius: 4px;
        color: var(--text-subtitle);
        background: var(--brand-weak);
        font-size: 13px;
      }

      .section-title {
        margin-bottom: 18px;
      }

      .section-title h2 {
        margin: 0;
        color: var(--text-title);
        font-size: 22px;
        font-weight: 400;
        line-height: 1.35;
      }

      .section-title p {
        margin: 12px 0 0;
        color: var(--text-subtitle);
        font-size: 14px;
        line-height: 1.6;
      }

      .icon-toolbar {
        display: grid;
        grid-template-columns: repeat(6, minmax(var(--icon-card-min), 1fr));
        gap: var(--icon-grid-gap);
        align-items: center;
        margin-bottom: 18px;
      }

      .icon-search {
        grid-column: span 3;
        width: 100%;
        height: 40px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text-title);
        background: #f5f5f5;
        outline: none;
        font-size: 14px;
      }

      .icon-search:focus {
        border-color: var(--line);
      }

      .icon-size-control {
        grid-column: span 2;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .download-svg {
        width: 100%;
        height: 40px;
        border: 1px solid var(--brand);
        border-radius: 6px;
        color: #ffffff;
        background: var(--brand);
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
      }

      .download-svg-count {
        display: none;
        margin-left: 6px;
      }

      .download-svg-count.is-visible {
        display: inline;
      }

      .download-svg:disabled {
        border-color: var(--line);
        color: var(--text-desc);
        background: #f5f5f5;
        cursor: not-allowed;
      }

      .icon-size-label {
        flex: 0 0 auto;
        color: var(--text-subtitle);
        font-size: 13px;
        white-space: nowrap;
      }

      .icon-size-slider {
        position: relative;
        flex: 1 1 auto;
        min-width: 0;
      }

      .icon-size {
        width: 100%;
        height: 28px;
        margin: 0;
        appearance: none;
        background: transparent;
        accent-color: var(--brand);
      }

      .icon-size::-webkit-slider-runnable-track {
        height: 6px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(
          to right,
          var(--brand) 0 var(--range-progress, 100%),
          #eeeeee var(--range-progress, 100%) 100%
        );
      }

      .icon-size::-webkit-slider-thumb {
        width: 20px;
        height: 20px;
        margin-top: -7px;
        border: 0;
        border-radius: 50%;
        appearance: none;
        background: var(--brand);
      }

      .icon-size::-moz-range-track {
        height: 6px;
        border: 0;
        border-radius: 999px;
        background: #eeeeee;
      }

      .icon-size::-moz-range-progress {
        height: 6px;
        border-radius: 999px;
        background: var(--brand);
      }

      .icon-size::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border: 0;
        border-radius: 50%;
        background: var(--brand);
      }

      .icon-size-bubble {
        position: absolute;
        top: -48px;
        left: var(--bubble-left, 50%);
        min-width: 48px;
        padding: 8px 10px;
        border-radius: 6px;
        color: var(--text-title);
        background: #ffffff;
        box-shadow: 0 8px 24px rgba(51, 51, 51, 0.14);
        font-size: 14px;
        line-height: 1;
        text-align: center;
        opacity: 0;
        transform: translateX(-50%) translateY(4px);
        transition: opacity 120ms ease, transform 120ms ease;
        pointer-events: none;
      }

      .icon-size-bubble::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -7px;
        width: 14px;
        height: 14px;
        background: #ffffff;
        box-shadow: 5px 5px 12px rgba(51, 51, 51, 0.08);
        transform: translateX(-50%) rotate(45deg);
      }

      .icon-size-slider.is-sliding .icon-size-bubble {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .icon-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(var(--icon-card-min), 1fr));
        gap: var(--icon-grid-gap);
      }

      .icon-card {
        min-width: 0;
        padding: 16px 12px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #ffffff;
        cursor: pointer;
        transition: box-shadow 160ms ease, transform 160ms ease;
      }

      .icon-card.is-hidden {
        display: none;
      }

      .icon-card:hover {
        box-shadow: 0 10px 28px rgba(51, 51, 51, 0.12);
        transform: translateY(-1px);
      }

      .icon-card.is-selected {
        border-color: rgba(230, 40, 40, 0.5);
      }

      .icon-preview {
        display: grid;
        place-items: center;
        height: 58px;
      }

      .icon-img {
        display: block;
        height: var(--icon-size, 48px);
        width: auto;
        max-width: calc(var(--icon-size, 48px) * 1.34);
        object-fit: contain;
      }

      .icon-name {
        margin-top: 10px;
        min-height: 34px;
        color: var(--text-title);
        font-size: 12px;
        line-height: 1.4;
        text-align: center;
        overflow-wrap: anywhere;
      }

      .icon-empty {
        display: none;
        padding: 36px;
        border: 1px dashed var(--line);
        border-radius: 6px;
        color: var(--text-desc);
        font-size: 14px;
        text-align: center;
      }

      .icon-empty.is-visible {
        display: block;
      }

      @media (max-width: 900px) {
        :root {
          --sidebar: 100%;
        }

        .topbar-inner,
        .layout {
          width: 100%;
          padding-right: 18px;
          padding-left: 18px;
        }

        .topnav a {
          padding: 0 12px;
        }

        .topnav a:nth-child(n + 3) {
          display: none;
        }

        .layout {
          display: block;
        }

        .sidebar {
          position: relative;
          top: 0;
          padding: 24px 0 18px;
          border-bottom: 1px solid var(--line);
        }

        .sidenav {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        }

        .main {
          padding: 36px 0 72px;
        }

        .doc-header {
          margin-bottom: 36px;
        }

        .icon-toolbar {
          grid-template-columns: 1fr;
          gap: 10px;
        }

        .icon-search,
        .icon-size-control,
        .download-svg {
          grid-column: auto;
        }

        .icon-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>

            <div class="icon-size-control">

            <button class="download-svg" type="button" disabled>

          </div>

        </section>
      </main>

        "play-circle",
        "star-circle",
      ];
      const iconFileNames = (() => {
        const seen = new Map();
        return iconNames.map((name) => {
          const count = (seen.get(name) || 0) + 1;
          seen.set(name, count);
          if (name === "minus-circle") return "minus‌-circle.svg";
          return count === 1 ? name + ".svg" : name + "-" + (count - 1) + ".svg";
        });
      })();

      const search = document.querySelector(".icon-search");
      const iconSizeSlider = document.querySelector(".icon-size-slider");
      const iconSize = document.querySelector(".icon-size");
      const iconSizeBubble = document.querySelector(".icon-size-bubble");
      const downloadSvg = document.querySelector(".download-svg");
      const downloadSvgCount = document.querySelector(".download-svg-count");
      const grid = document.querySelector(".icon-grid");
      const empty = document.querySelector(".icon-empty");
      let sizeBubbleTimer = 0;
      let isDownloading = false;
      const selectedIcons = new Set();

      const cards = iconNames.map((name, index) => {
        const card = document.createElement("article");
        card.className = "icon-card";
        card.dataset.name = name.toLowerCase();
        card.dataset.iconName = name;
        card.dataset.fileName = iconFileNames[index];
        card.tabIndex = 0;
        card.setAttribute("role", "button");
        card.setAttribute("aria-pressed", "false");

        const preview = document.createElement("div");
        preview.className = "icon-preview";

        const icon = document.createElement("img");
        icon.className = "icon-img";
        icon.src = "./icons/" + iconFileNames[index];
        icon.alt = "";
        icon.loading = "lazy";
        icon.decoding = "async";
        icon.setAttribute("aria-hidden", "true");

        const label = document.createElement("div");
        label.className = "icon-name";
        label.textContent = name;

        preview.appendChild(icon);
        card.append(preview, label);
        card.addEventListener("click", () => toggleIconSelection(card));
        card.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" && event.key !== " ") return;
          event.preventDefault();
          toggleIconSelection(card);
        });
        grid.appendChild(card);
        return card;
      });

      function toggleIconSelection(card) {
        const iconName = card.dataset.iconName;
        const isSelected = selectedIcons.has(iconName);
        if (isSelected) {
          selectedIcons.delete(iconName);
        } else {
          selectedIcons.add(iconName);
        }
        card.classList.toggle("is-selected", !isSelected);
        card.setAttribute("aria-pressed", String(!isSelected));
        updateDownloadState();
      }

      function updateDownloadState() {
        downloadSvg.disabled = selectedIcons.size === 0 || isDownloading;
        downloadSvg.childNodes[0].nodeValue = isDownloading ? "打包中" : "下载SVG";
        downloadSvgCount.textContent = selectedIcons.size ? selectedIcons.size : "";
        downloadSvgCount.classList.toggle("is-visible", selectedIcons.size > 0);
      }

      function updateIconFilter() {
        const keyword = search.value.trim().toLowerCase();
        const sortedCards = keyword
          ? [...cards].sort((first, second) => {
              const firstName = first.dataset.name;
              const secondName = second.dataset.name;
              const firstStarts = firstName.startsWith(keyword);
              const secondStarts = secondName.startsWith(keyword);
              if (firstStarts !== secondStarts) return firstStarts ? -1 : 1;
              return cards.indexOf(first) - cards.indexOf(second);
            })
          : cards;
        let visibleCount = 0;
        sortedCards.forEach((card) => {
          const isVisible = !keyword || card.dataset.name.includes(keyword);
          card.classList.toggle("is-hidden", !isVisible);
          grid.appendChild(card);
          if (isVisible) visibleCount += 1;
        });
        empty.classList.toggle("is-visible", visibleCount === 0);
      }

      function updateIconSize() {
        const min = Number(iconSize.min);
        const max = Number(iconSize.max);
        const value = Number(iconSize.value);
        const percent = (value - min) / (max - min);
        const thumbOffset = 10 - percent * 20;
        document.documentElement.style.setProperty("--icon-size", iconSize.value + "px");
        iconSizeSlider.style.setProperty("--range-progress", percent * 100 + "%");
        iconSizeSlider.style.setProperty(
          "--bubble-left",
          `calc(${percent * 100}% + ${thumbOffset}px)`
        );
        iconSizeBubble.textContent = iconSize.value;
      }

      function showSizeBubble() {
        iconSizeSlider.classList.add("is-sliding");
        window.clearTimeout(sizeBubbleTimer);
        sizeBubbleTimer = window.setTimeout(() => {
          iconSizeSlider.classList.remove("is-sliding");
        }, 900);
      }

      function createCrcTable() {
        const table = [];
        for (let index = 0; index < 256; index += 1) {
          let value = index;
          for (let bit = 0; bit < 8; bit += 1) {
            value = value & 1 ? 0xedb88320 ^ (value >>> 1) : value >>> 1;
          }
          table[index] = value >>> 0;
        }
        return table;
      }

      const crcTable = createCrcTable();
      const zipEncoder = new TextEncoder();

      function getCrc32(data) {
        let crc = 0xffffffff;
        data.forEach((byte) => {
          crc = crcTable[(crc ^ byte) & 0xff] ^ (crc >>> 8);
        });
        return (crc ^ 0xffffffff) >>> 0;
      }

      function writeUint16(target, offset, value) {
        target[offset] = value & 0xff;
        target[offset + 1] = (value >>> 8) & 0xff;
      }

      function writeUint32(target, offset, value) {
        target[offset] = value & 0xff;
        target[offset + 1] = (value >>> 8) & 0xff;
        target[offset + 2] = (value >>> 16) & 0xff;
        target[offset + 3] = (value >>> 24) & 0xff;
      }

      function createZip(entries) {
        const now = new Date();
        const dosTime =
          (now.getHours() << 11) | (now.getMinutes() << 5) | Math.floor(now.getSeconds() / 2);
        const dosDate =
          ((now.getFullYear() - 1980) << 9) | ((now.getMonth() + 1) << 5) | now.getDate();
        const localParts = [];
        const centralParts = [];
        let offset = 0;

        entries.forEach((entry) => {
          const nameBytes = zipEncoder.encode(entry.name);
          const data = entry.data;
          const crc = getCrc32(data);

          const localHeader = new Uint8Array(30 + nameBytes.length);
          writeUint32(localHeader, 0, 0x04034b50);
          writeUint16(localHeader, 4, 20);
          writeUint16(localHeader, 6, 0x0800);
          writeUint16(localHeader, 8, 0);
          writeUint16(localHeader, 10, dosTime);
          writeUint16(localHeader, 12, dosDate);
          writeUint32(localHeader, 14, crc);
          writeUint32(localHeader, 18, data.length);
          writeUint32(localHeader, 22, data.length);
          writeUint16(localHeader, 26, nameBytes.length);
          writeUint16(localHeader, 28, 0);
          localHeader.set(nameBytes, 30);

          const centralHeader = new Uint8Array(46 + nameBytes.length);
          writeUint32(centralHeader, 0, 0x02014b50);
          writeUint16(centralHeader, 4, 20);
          writeUint16(centralHeader, 6, 20);
          writeUint16(centralHeader, 8, 0x0800);
          writeUint16(centralHeader, 10, 0);
          writeUint16(centralHeader, 12, dosTime);
          writeUint16(centralHeader, 14, dosDate);
          writeUint32(centralHeader, 16, crc);
          writeUint32(centralHeader, 20, data.length);
          writeUint32(centralHeader, 24, data.length);
          writeUint16(centralHeader, 28, nameBytes.length);
          writeUint16(centralHeader, 30, 0);
          writeUint16(centralHeader, 32, 0);
          writeUint16(centralHeader, 34, 0);
          writeUint16(centralHeader, 36, 0);
          writeUint32(centralHeader, 38, 0);
          writeUint32(centralHeader, 42, offset);
          centralHeader.set(nameBytes, 46);

          localParts.push(localHeader, data);
          centralParts.push(centralHeader);
          offset += localHeader.length + data.length;
        });

        const centralSize = centralParts.reduce((sum, part) => sum + part.length, 0);
        const endRecord = new Uint8Array(22);
        writeUint32(endRecord, 0, 0x06054b50);
        writeUint16(endRecord, 4, 0);
        writeUint16(endRecord, 6, 0);
        writeUint16(endRecord, 8, entries.length);
        writeUint16(endRecord, 10, entries.length);
        writeUint32(endRecord, 12, centralSize);
        writeUint32(endRecord, 16, offset);
        writeUint16(endRecord, 20, 0);

        return new Blob([...localParts, ...centralParts, endRecord], { type: "application/zip" });
      }

      function triggerFileDownload(blob, fileName) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      async function downloadSelectedSvgs() {
        const selectedCards = cards.filter((card) => selectedIcons.has(card.dataset.iconName));
        if (selectedCards.length === 0) return;
        isDownloading = true;
        updateDownloadState();
        try {
          const entries = await Promise.all(
            selectedCards.map(async (card) => {
              const response = await fetch("./icons/" + encodeURIComponent(card.dataset.fileName));
              if (!response.ok) throw new Error(card.dataset.fileName);
              return {
                name: card.dataset.fileName,
                data: new Uint8Array(await response.arrayBuffer()),
              };
            })
          );
          triggerFileDownload(createZip(entries), "damo-icons.zip");
        } catch (error) {
          window.alert("SVG 打包失败，请刷新页面后重试。");
        } finally {
          isDownloading = false;
          updateDownloadState();
        }
      }

      search.addEventListener("input", updateIconFilter);
      downloadSvg.addEventListener("click", downloadSelectedSvgs);
      iconSize.addEventListener("input", () => {
        updateIconSize();
        showSizeBubble();
      });
      iconSize.addEventListener("pointerdown", showSizeBubble);
      iconSize.addEventListener("pointerup", showSizeBubble);
      iconSize.addEventListener("pointerleave", showSizeBubble);
      iconSize.addEventListener("focus", showSizeBubble);
      iconSize.addEventListener("blur", () => iconSizeSlider.classList.remove("is-sliding"));
      updateDownloadState();
      updateIconSize();
      updateIconFilter();
    </script>
  </body>
</html>
